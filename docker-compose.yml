version: '3.8'

services:
  app:
    build: .
    container_name: tg-stream-proxy
    env_file: .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
