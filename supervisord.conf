[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:telegram-bot-api]
command=sh -c 'telegram-bot-api --local -d /app/telegram-bot-api-data --http-port 8081 --api-id="${TELEGRAM_API_ID}" --api-hash="${TELEGRAM_API_HASH}"'
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
user=root

[program:fastapi-proxy]
command=python3 main.py
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
user=root
