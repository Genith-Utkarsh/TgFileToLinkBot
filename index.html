<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stream Player</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.css" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b0d12;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e6e8ee;
    padding: 24px;
  }
  .wrap { width: 100%; max-width: 900px; }
  .card {
    background: #11141b;
    border: 1px solid #1f2430;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
  }
  .status {
    padding: 48px 24px;
    text-align: center;
    color: #9aa3b2;
  }
  .status .spinner {
    width: 32px; height: 32px;
    margin: 0 auto 16px;
    border: 3px solid #2a3040;
    border-top-color: #6ea8fe;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status.error { color: #ff8585; }
  .meta {
    padding: 14px 18px;
    font-size: 13px;
    color: #6b7280;
    border-top: 1px solid #1f2430;
    word-break: break-all;
  }
  audio { width: 100%; }
  video, audio { display: block; width: 100%; background: #000; }
  .hidden { display: none !important; }
  .empty {
    padding: 60px 24px;
    text-align: center;
    color: #6b7280;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="status" class="status">
        <div class="spinner"></div>
        <div id="statusText">Loading…</div>
      </div>
      <video id="player" class="hidden" playsinline controls></video>
      <div id="meta" class="meta hidden"></div>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.js"></script>
<script>
(function () {
  "use strict";

  var params = new URLSearchParams(window.location.search);
  var url = params.get("url");

  var statusEl = document.getElementById("status");
  var statusTextEl = document.getElementById("statusText");
  var videoEl = document.getElementById("player");
  var metaEl = document.getElementById("meta");

  function showEmpty() {
    statusEl.className = "status";
    statusEl.querySelector(".spinner").style.display = "none";
    statusTextEl.textContent = "No ?url= parameter given — open a link from the bot instead.";
  }

  function showError(msg) {
    statusEl.className = "status error";
    statusEl.querySelector(".spinner").style.display = "none";
    statusTextEl.textContent = msg;
  }

  function showLoading(msg) {
    statusEl.className = "status";
    statusEl.querySelector(".spinner").style.display = "block";
    statusTextEl.textContent = msg;
  }

  function reveal() {
    statusEl.classList.add("hidden");
    videoEl.classList.remove("hidden");
    metaEl.classList.remove("hidden");
    metaEl.textContent = url;
  }

  function isHlsUrl(u) {
    return /\.m3u8(\?|$)/i.test(u);
  }

  function startPlyr() {
    new Plyr(videoEl, { captions: { active: false } });
  }

  function attachHls() {
    if (window.Hls && window.Hls.isSupported()) {
      var hls = new Hls({ lowLatencyMode: false });
      hls.loadSource(url);
      hls.attachMedia(videoEl);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        reveal();
        startPlyr();
      });
      hls.on(Hls.Events.ERROR, function (_evt, data) {
        if (data && data.fatal) {
          console.error("hls.js fatal error", data);
          showError("Playback error: " + (data.details || "unknown HLS error"));
        }
      });
    } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
      // Safari / iOS: native HLS support, no hls.js needed.
      videoEl.src = url;
      videoEl.addEventListener("loadedmetadata", function () {
        reveal();
        startPlyr();
      });
      videoEl.addEventListener("error", function () {
        showError("This browser couldn't load the HLS stream.");
      });
    } else {
      showError("This browser doesn't support HLS playback.");
    }
  }

  function attachDirect() {
    videoEl.src = url;
    videoEl.addEventListener("loadedmetadata", function () {
      reveal();
      startPlyr();
    });
    videoEl.addEventListener("error", function () {
      showError("Couldn't load that file — the link may have expired.");
    });
  }

  // For HLS links, the manifest endpoint returns 202 while ffmpeg is
  // still packaging the file in the background. Poll briefly instead
  // of just failing — most uploads finish within a few seconds.
  function waitForHlsThenPlay(attempt) {
    attempt = attempt || 0;
    var maxAttempts = 30; // ~60s
    fetch(url, { method: "GET", cache: "no-store" })
      .then(function (res) {
        if (res.status === 200) {
          attachHls();
        } else if (res.status === 202 && attempt < maxAttempts) {
          showLoading("Preparing your stream for smooth playback… (" + (attempt + 1) + ")");
          setTimeout(function () { waitForHlsThenPlay(attempt + 1); }, 2000);
        } else if (res.status === 202) {
          showError("Still preparing after a while — try reopening the link from the bot in a bit.");
        } else {
          showError("Stream not available (HTTP " + res.status + ").");
        }
      })
      .catch(function (err) {
        console.error(err);
        showError("Couldn't reach the stream server.");
      });
  }

  if (!url) {
    showEmpty();
    return;
  }

  if (isHlsUrl(url)) {
    waitForHlsThenPlay();
  } else {
    attachDirect();
  }
})();
</script>
</body>
</html>
